services:
  vde:
    image: ${POKY_IMAGE}
    platform: linux/${ENV_ARCH}
    command:
      [
        "/bin/sh",
        "-c",
        "touch /workdir/.initialized; chown -hR ${WORKDIR_UID}:${WORKDIR_GID} /workdir",
      ]
    ports:
      - "${TOASTER_WEBUI}:8000"
    volumes:
      - ${PROJECT_TOP}:${WORKSPACE_PATH}
      - workdir:/workdir
      - ${HOME}/.ssh:/home/vari/.ssh
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    user: root
    container_name: "${PROJECT_NAME}-${ENV_ARCH}"
    hostname: "${PROJECT_NAME}-${ENV_ARCH}"

  filebrowser:
    image: filebrowser/filebrowser
    platform: linux/${ENV_ARCH}
    container_name: "${VOLUME_NAME}_filebrowser"
    ports:
      - "${FILEBROWSER_PORT}:80"
    volumes:
      - workdir:/srv
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - FB_NOAUTH=true
      - FB_BASEURL=/filebrowser
    depends_on:
      - vde

  netboot-server:
    image: ${NETBOOT_SERVER_IMAGE}
    platform: linux/${ENV_ARCH}
    container_name: "${VOLUME_NAME}_netboot-server"
    privileged: true
    network_mode: "bridge"
    volumes:
      - workdir:/workdir:rw
    ports:
      - "2049:2049/udp"
      - "35111:111/udp"
      - "20048:20048/udp"
      - "32765-32769:32765-32769/udp"
    environment:
      - NFS_SERVER_DEBUG=1
      - NFSROOT_DIR=/workdir/nfsroot
    depends_on:
      - vde

volumes:
  workdir:
